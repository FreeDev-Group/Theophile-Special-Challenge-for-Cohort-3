<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Visual Bug Sketcher</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;600&display=swap" rel="stylesheet">
    <style>
        :root {
            --bg-color: #0f172a;
            --panel-bg: rgba(30, 41, 59, 0.7);
            --accent-color: #38bdf8;
            --text-color: #f8fafc;
            --glass-border: rgba(255, 255, 255, 0.1);
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Outfit', sans-serif;
        }

        body {
            background-color: var(--bg-color);
            color: var(--text-color);
            height: 100vh;
            overflow: hidden;
            display: flex;
            flex-direction: column;
        }

        header {
            padding: 1.5rem 2rem;
            display: flex;
            justify-content: space-between;
            align-items: center;
            background: linear-gradient(to bottom, rgba(15, 23, 42, 0.8), transparent);
            z-index: 10;
        }

        h1 {
            font-size: 1.5rem;
            font-weight: 600;
            background: linear-gradient(45deg, #38bdf8, #818cf8);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }

        .container {
            flex: 1;
            position: relative;
            display: flex;
            justify-content: center;
            align-items: center;
            padding: 1rem;
        }

        canvas {
            background-color: #ffffff;
            border-radius: 1rem;
            box-shadow: 0 25px 50px -12px rgba(0, 0, 0, 0.5);
            cursor: crosshair;
            max-width: 100%;
            max-height: 100%;
        }

        .controls {
            position: absolute;
            bottom: 2rem;
            left: 50%;
            transform: translateX(-50%);
            display: flex;
            gap: 1rem;
            padding: 0.75rem 1.5rem;
            background: var(--panel-bg);
            backdrop-filter: blur(12px);
            border: 1px solid var(--glass-border);
            border-radius: 9999px;
            box-shadow: 0 10px 15px -3px rgba(0, 0, 0, 0.1);
            z-index: 20;
            transition: all 0.3s ease;
        }

        .controls:hover {
            border-color: var(--accent-color);
            box-shadow: 0 0 20px rgba(56, 189, 248, 0.2);
        }

        .control-group {
            display: flex;
            align-items: center;
            gap: 0.5rem;
        }

        button {
            background: transparent;
            border: none;
            color: var(--text-color);
            padding: 0.5rem 1rem;
            border-radius: 0.5rem;
            cursor: pointer;
            font-weight: 500;
            transition: all 0.2s;
            display: flex;
            align-items: center;
            gap: 0.5rem;
        }

        button:hover {
            background: rgba(255, 255, 255, 0.1);
        }

        button.active {
            background: var(--accent-color);
            color: var(--bg-color);
        }

        .btn-primary {
            background: var(--accent-color);
            color: var(--bg-color);
        }

        .btn-primary:hover {
            background: #7dd3fc;
            transform: translateY(-1px);
        }

        input[type="color"] {
            -webkit-appearance: none;
            border: none;
            width: 32px;
            height: 32px;
            border-radius: 50%;
            cursor: pointer;
            background: transparent;
        }

        input[type="color"]::-webkit-color-swatch-wrapper {
            padding: 0;
        }

        input[type="color"]::-webkit-color-swatch {
            border: 2px solid white;
            border-radius: 50%;
        }

        .brush-size {
            width: 100px;
        }

        .status {
            position: absolute;
            top: 2rem;
            right: 2rem;
            font-size: 0.875rem;
            opacity: 0.6;
        }
    </style>
</head>
<body>
    <header>
        <h1>Visual Bug Sketcher</h1>
        <div class="control-group">
            <button onclick="clearCanvas()" id="clearBtn">Clear Canvas</button>
            <button onclick="downloadImage()" class="btn-primary">Export for Report</button>
        </div>
    </header>

    <div class="container">
        <canvas id="canvas"></canvas>
    </div>

    <div class="controls">
        <div class="control-group">
            <label>Color</label>
            <input type="color" id="colorPicker" value="#000000" onchange="updateBrush()">
        </div>
        <div class="control-group">
            <label>Size</label>
            <input type="range" id="brushSize" min="1" max="50" value="5" class="brush-size" oninput="updateBrush()">
        </div>
        <div class="control-group">
            <button onclick="setMode('brush')" id="brushBtn" class="active">Brush</button>
            <button onclick="setMode('eraser')" id="eraserBtn">Eraser</button>
        </div>
    </div>

    <div class="status">Testing Phase: Perseverance & Success</div>

    <script>
        const canvas = document.getElementById('canvas');
        const ctx = canvas.getContext('2d');
        const colorPicker = document.getElementById('colorPicker');
        const brushSize = document.getElementById('brushSize');
        const brushBtn = document.getElementById('brushBtn');
        const eraserBtn = document.getElementById('eraserBtn');

        let painting = false;
        let mode = 'brush';

        function initCanvas() {
            canvas.width = window.innerWidth * 0.8;
            canvas.height = window.innerHeight * 0.6;
            ctx.fillStyle = '#ffffff';
            ctx.fillRect(0, 0, canvas.width, canvas.height);
            ctx.lineCap = 'round';
            ctx.lineJoin = 'round';
        }

        function startPosition(e) {
            painting = true;
            draw(e);
        }

        function finishedPosition() {
            painting = false;
            ctx.beginPath();
        }

        function draw(e) {
            if (!painting) return;
            
            const rect = canvas.getBoundingClientRect();
            const x = e.clientX - rect.left;
            const y = e.clientY - rect.top;

            ctx.lineWidth = brushSize.value;
            ctx.strokeStyle = mode === 'brush' ? colorPicker.value : '#ffffff';

            ctx.lineTo(x, y);
            ctx.stroke();
            ctx.beginPath();
            ctx.moveTo(x, y);
        }

        function setMode(newMode) {
            mode = newMode;
            brushBtn.classList.toggle('active', mode === 'brush');
            eraserBtn.classList.toggle('active', mode === 'eraser');
        }

        function updateBrush() {
            // Updated automatically via mode and inputs
        }

        function clearCanvas() {
            if (confirm('Are you sure you want to clear the canvas?')) {
                ctx.fillStyle = '#ffffff';
                ctx.fillRect(0, 0, canvas.width, canvas.height);
            }
        }

        function downloadImage() {
            const link = document.createElement('a');
            link.download = 'bug-sketch.png';
            link.href = canvas.toDataURL();
            link.click();
        }

        canvas.addEventListener('mousedown', startPosition);
        canvas.addEventListener('mouseup', finishedPosition);
        canvas.addEventListener('mousemove', draw);
        
        window.addEventListener('resize', () => {
            // Note: resizing clears canvas in simple implementation
            // For a premium feel, we could save the data
            const temp = ctx.getImageData(0, 0, canvas.width, canvas.height);
            canvas.width = window.innerWidth * 0.8;
            canvas.height = window.innerHeight * 0.6;
            ctx.putImageData(temp, 0, 0);
        });

        initCanvas();
    </script>
</body>
</html>
